name: Build VieSched++ macOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # allows manual trigger

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      # 1. Checkout source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install Homebrew and Qt6
      - name: Install Qt
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          brew install qt

      - name: Install Boost
        run: brew install boost


      # 3. Install CMake
      - name: Install build tools
        run: |
          brew install cmake git

      # 4. Configure the project
      - name: Configure project
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_PREFIX_PATH=$(brew --prefix qt) \
            -DBOOST_ROOT=$(brew --prefix boost) \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DBoost_NO_SYSTEM_PATHS=ON \
            -DBoost_USE_STATIC_LIBS=OFF \
            -DBoost_USE_MULTITHREADED=ON \
            -DBoost_USE_STATIC_RUNTIME=OFF \
            -DBoost_COMPONENTS=system,thread,filesystem

      # 5. Build project
      - name: Build project
        run: |
          cd build
          make -j$(sysctl -n hw.ncpu)

      # 6. Deploy Qt libraries
      - name: Deploy Qt
        run: |
          cd build
          /usr/local/opt/qt/bin/macdeployqt VieSched++.app

      # 7. Upload compiled app
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VieSched-macos
          path: build/VieSched++.app
