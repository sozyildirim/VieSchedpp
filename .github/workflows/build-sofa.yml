name: Build SOFA macOS

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download SOFA
        run: |
          curl -L -o sofa.tar.gz https://www.iausofa.org/2023-10-11c/sofa_c-20231011.tar.gz
          tar -xzf sofa.tar.gz

      - name: Compile SOFA
        run: |
          cd sofa_c-20231011/c/src
          clang -c *.c
          ar rcs libsofa.a *.o

      - name: Upload macOS library
        uses: actions/upload-artifact@v4
        with:
          name: libsofa-macos
          path: sofa_c-20231011/c/src/libsofa.a
