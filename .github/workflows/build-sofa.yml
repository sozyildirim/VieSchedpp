name: Build SOFA Library

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential wget

      - name: Download SOFA source
        run: |
          wget https://www.iausofa.org/2023_1011_C/sofa_c-20231011.tar.gz
          tar -xzf sofa_c-20231011.tar.gz

      - name: Compile SOFA
        run: |
          cd sofa/20231011/c/src
          gcc -c *.c
          ar rcs libsofa.a *.o

      - name: Upload library artifact
        uses: actions/upload-artifact@v4
        with:
          name: libsofa
          path: sofa/20231011/c/src/libsofa.a
