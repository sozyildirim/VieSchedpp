name: Build SOFA macOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Clone SOFA
        run: |
          git clone https://github.com/Starlink/sofa.git --single-branch --branch=vendor IAU_SOFA

      - name: Build SOFA
        run: |
          cd IAU_SOFA 
          mkdir Release 
          cd src 
          make 
          mv libsofa_c.a ../Release/
      
      - name: Verify library
        run: ls -R ${{ github.workspace }}/IAU_SOFA

      - name: Upload library
        uses: actions/upload-artifact@v4
        with:
          name: sofa-macos
          path: ${{ github.workspace }}/IAU_SOFA/Release/libsofa_c.a

