name: Build VieSched++ macOS4

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
#      - name: Cache Qt
#        uses: actions/cache@v4
#        with:
#          path: |
#            /opt/homebrew/Cellar/qt
#            /opt/homebrew/opt/qt
#          key: ${{ runner.os }}-qt
          
      - name: Install Official Qt6 (Universal)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.1'
          cache: true
          host: 'mac'
          target: 'desktop'
        
      - name: Debug Qt Path
        run: |
          echo "Qt dir: $Qt6_DIR"
          which qmake
          qmake -query

      - name: Install Boost
        run: brew install boost
        
#      - name: Install tools
#        run: |
#          brew install cmake git

      - name: Configure project
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_PREFIX_PATH=$Qt6_DIR

      - name: Show repository structure
        run: |
          pwd
          ls -R
          
      - name: Build project
        run: |
          cd build
          make -j$(sysctl -n hw.ncpu)


      - name: Deploy Qt libraries
        run: |
          cd build
          macdeployqt $GITHUB_WORKSPACE/build/VieSchedpp.app -verbose=1
          
      - name: Upload compiled app
        uses: actions/upload-artifact@v4
        with:
          name: VieSched-macos
          path: build/VieSchedpp.app
